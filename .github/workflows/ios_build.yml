name: iOS-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - run: flutter pub get

      # --- NEW STEP TO FIX CAMERA PERMISSIONS ---
      - name: Configure iOS Permissions
        run: |
          cd ios
          # This command searches for the flutter_additional_ios_build_settings line 
          # and inserts the Camera permission macro right after it.
          sed -i '' '/flutter_additional_ios_build_settings(target)/a \
          target.build_configurations.each do |config| \
            config.build_settings["GCC_PREPROCESSOR_DEFINITIONS"] ||= ["$(inherited)", "PERMISSION_CAMERA=1"] \
          end' Podfile
        working-directory: .

      - run: pod repo update
        working-directory: ios

      - run: flutter build ios --release --no-codesign

      - run: mkdir Payload
        working-directory: build/ios/iphoneos

      - run: mv Runner.app/ Payload
        working-directory: build/ios/iphoneos

      - name: Zip output
        run: zip -qq -r -9 ETHQR.ipa Payload
        working-directory: build/ios/iphoneos

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/ios/iphoneos/CoopX.ipa
          tag: v4.0
          overwrite: true
          body: "This is release is with new login page"
